version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bi-dashboard-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEBUG=True
    volumes:
      - ./backend:/app
    command: python run.py
    networks:
      - bi-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bi-dashboard-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:8000
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    networks:
      - bi-network
    command: npm run dev

networks:
  bi-network:
    driver: bridge
